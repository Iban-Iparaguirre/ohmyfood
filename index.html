<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="assets/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
    <title>Accueil - ohmyfood!</title>
</head>

<body>
    <header class="header">
        <h1 class="header__logo">ohmyfood</h1>
        <div class="header__local">
            <i class="fa-solid fa-location-dot"></i>
            <button class="header__local-text">Paris, Belleville</button>
        </div>
    </header>
    <main>
        <section class="explorer">
            <h2 class="explorer__title">Réservez le menu qui vous convient</h2>
            <p class="explorer__subtitle">Découvrez des restaurants d'exception, sélectionnés par nos soins.</p>
            <button class="explorer__button">Explorer nos restaurants</button>
        </section>

        <section class="function">
            <h2 class="function__title">Fonctionnement</h2>
            <ol class="function__list">
                <li class="function__button">
                    <span class="function__number">1</span>
                    <i class="fa-solid fa-mobile-screen-button function__icon"></i>
                    <span>Choisissez un restaurant</span>
                </li>
                <li class="function__button">
                    <span class="function__number">2</span>
                    <i class="fa-solid fa-list function__icon"></i>
                    <span>Composez votre menu</span>
                </li>
                <li class="function__button">
                    <span class="function__number">3</span>
                    <i class="fa-solid fa-store function__icon"></i>
                    <span>Dégustez au restaurant</span>
                </li>
            </ol>
        </section>
    </main>

    <footer>

    </footer>
</body>
</html>
